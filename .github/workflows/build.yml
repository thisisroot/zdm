name: Build ZDM

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          - platform: ubuntu-22.04

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # tauri.conf.json's bundle.targets is "all", which on Linux means three
      # separate installer formats from this one runner: .deb (Debian/Ubuntu),
      # .rpm (Fedora/RHEL/openSUSE), and an AppImage (runs on nearly any distro
      # without a package manager at all). rpm and libfuse2 aren't part of the
      # base image, and without libfuse2 the AppImage step fails outright on
      # ubuntu-22.04+ runners since they dropped FUSE2 by default.
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev pkg-config libdbus-1-dev \
            rpm libfuse2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # Unsigned build. Tauri's macOS/Windows signing steps trigger whenever
      # their certificate env var is merely *set*, even to an empty string —
      # GitHub substitutes secrets.X with "" when the secret doesn't exist, so
      # listing WINDOWS_CERTIFICATE/APPLE_CERTIFICATE here unconditionally
      # breaks the build rather than skipping signing. Only add them back once
      # real certificates exist as repo secrets.
      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('ZDM {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
