name: Build ZDM

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          - platform: ubuntu-22.04

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # tauri.conf.json's bundle.targets is "all", which on Linux means three
      # separate installer formats from this one runner: .deb (Debian/Ubuntu),
      # .rpm (Fedora/RHEL/openSUSE), and an AppImage (runs on nearly any distro
      # without a package manager at all). rpm and libfuse2 aren't part of the
      # base image, and without libfuse2 the AppImage step fails outright on
      # ubuntu-22.04+ runners since they dropped FUSE2 by default.
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev pkg-config libdbus-1-dev \
            rpm libfuse2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # Signing is opt-in via repo secrets — unset, these env vars are empty
      # and tauri-action silently produces the same unsigned build as today.
      # Adding a Windows Authenticode cert (WINDOWS_CERTIFICATE/_PASSWORD) or
      # an Apple Developer ID (APPLE_CERTIFICATE/_PASSWORD, APPLE_SIGNING_IDENTITY,
      # APPLE_ID/_PASSWORD, APPLE_TEAM_ID) as secrets is enough to turn signing on.
      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('ZDM {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
